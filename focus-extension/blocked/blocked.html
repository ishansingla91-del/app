<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Mode Active - Study Planner AI</title>
  <link rel="stylesheet" href="blocked.css">
</head>
<body>
  <div class="container">
    <!-- Background Animation -->
    <div class="bg-animation">
      <div class="circle circle-1"></div>
      <div class="circle circle-2"></div>
      <div class="circle circle-3"></div>
    </div>

    <!-- Content -->
    <div class="content">
      <!-- Icon -->
      <div class="icon-container">
        <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
          <path d="M12 6V12L16 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>

      <!-- Main Message -->
      <h1 class="title">Focus Mode is Active</h1>
      
      <p class="subtitle">This website is blocked during your focus session</p>

      <!-- Motivational Quote -->
      <div class="quote-box">
        <svg class="quote-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 17h3l2-4V7H5v6h3zm8 0h3l2-4V7h-6v6h3z"/>
        </svg>
        <p class="quote" id="quote">Stay focused. Your future self will thank you.</p>
      </div>

      <!-- Time Remaining -->
      <div class="time-box" id="timeBox">
        <svg class="time-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
          <path d="M12 6V12L16 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div class="time-content">
          <span class="time-label">Time Remaining</span>
          <span class="time-value" id="timeRemaining">--:--</span>
        </div>
      </div>

      <!-- Blocked URL Info -->
      <div class="blocked-info" id="blockedInfo">
        <p class="blocked-label">Blocked URL:</p>
        <p class="blocked-url" id="blockedUrl">--</p>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button class="btn btn-primary" id="dashboardBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
            <rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
            <rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
            <rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
          </svg>
          Return to Study Dashboard
        </button>
      </div>

      <!-- Footer -->
      <div class="footer">
        <p>Study Planner AI - Focus Mode Extension</p>
      </div>
    </div>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
